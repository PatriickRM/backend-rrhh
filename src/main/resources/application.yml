server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rrhh_system?useSSL=false&serverTimezone=America/Lima}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

security:
  jwt:
    secret-key: ${SECURITY_JWT_SECRET_KEY:dev_secret_key_minimo_32_caracteres_aqui_!!}
    expiration: ${SECURITY_JWT_EXPIRATION:86400000}

# Actuator — para healthcheck en Docker
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.rrhh.backend: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
# Perfil local (desarrollo sin Docker)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mysql://localhost:3306/rrhh_system?useSSL=false&serverTimezone=America/Lima
    username: root
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    clean-disabled: true
logging:
  level:
    com.rrhh.backend: DEBUG
    org.hibernate.SQL: DEBUG

---
# Perfil docker
spring:
  config:
    activate:
      on-profile: docker
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.rrhh.backend: INFO
