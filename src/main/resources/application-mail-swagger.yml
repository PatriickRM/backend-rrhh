# ── Agrega estos bloques a tu application.yml existente ──────────────────────

# ── Spring Mail (notificaciones por email) ────────────────────────────────────
spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false       # true solo para depuración local

# ── Swagger UI (springdoc) ────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha             # ordena los tags alfabéticamente
    display-request-duration: true # muestra el tiempo de respuesta en Swagger UI
    try-it-out-enabled: true       # habilita el botón "Try it out" por defecto
  show-actuator: false             # oculta los endpoints de Actuator en Swagger
