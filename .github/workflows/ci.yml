name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Java ${{ matrix.java }} — Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ '21' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: rrhh_test
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto
        run: ./mvnw compile -q

      - name: Ejecutar tests unitarios
        run: ./mvnw test -pl . -Dgroups="!integration" -q
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/rrhh_test?useSSL=false&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SECURITY_JWT_SECRET_KEY: ci_test_secret_key_minimo_32_caracteres
          SECURITY_JWT_EXPIRATION: 3600000

      - name: Ejecutar tests de integración
        run: ./mvnw test -pl . -Dgroups="integration" -q
        env:
          SECURITY_JWT_SECRET_KEY: ci_test_secret_key_minimo_32_caracteres
          SECURITY_JWT_EXPIRATION: 3600000
          # Testcontainers levanta su propio MySQL — no necesita el de arriba

      - name: Generar reporte de cobertura (JaCoCo)
        run: ./mvnw jacoco:report -q

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Verificar cobertura mínima (60%)
        run: ./mvnw jacoco:check -q

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Verificar que el Dockerfile construye correctamente
        run: docker build -t rrhh-backend:ci-check .

      - name: Verificar docker-compose config
        run: docker compose config --quiet
